<!DOCTYPE html>
<html>

<head>

    <title>Patent Highlighter</title>

    <style>

        body {
            width: 340px;
            font-family: Arial;
            padding: 10px;
        }

        h2 {
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 70px;
            margin-bottom: 10px;
            resize: vertical;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .preset-btn {
            width: 22px;
            height: 22px;
            border: 1px solid #555;
            cursor: pointer;
            padding: 0;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            cursor: pointer;
        }

    </style>

</head>

<body>

    <h2>Patent Highlighter</h2>

    <div id="groupsContainer"></div>

    <button id="addGroupBtn">
        + Add Group
    </button>

    <button id="highlightBtn">
        Highlight
    </button>

    <button id="clearBtn">
        Clear
    </button>

    <script src="popup.js"></script>

</body>

</html>
