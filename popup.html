<!DOCTYPE html>
<html>

<head>

    <title>Patent Highlighter</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
	<div class="top-bar">
	
		<div class="toggle-row">
	
			<label class="switch">
				<input
					type="checkbox"
					id="autoHighlight"
				>
				<span class="slider"></span>
			</label>
	
			<span id="toggleLabel">Active</span>
	
		</div>
	
		<button id="resetBtn">
			Reset
		</button>
	
	</div>

    <h2>Patent Highlighter</h2>

    <div id="groupsContainer"></div>

    <button id="addGroupBtn">
        + Add Group
    </button>
    <button id="saveBtn">
		Save
	</button>

    <script src="popup.js"></script>

</body>

</html>
