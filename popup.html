<!DOCTYPE html>
<html>

<head>

    <title>Patent Highlighter</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
	<div class="top-bar">
	
		<div class="toggle-row">
	
			<label class="switch">
				<input
					type="checkbox"
					id="autoHighlight"
				>
				<span class="slider"></span>
			</label>
	
			<span id="toggleLabel">Active</span>
	
		</div>
	
		<button id="resetBtn">
			Reset
		</button>
	
	</div>
	<input
		type="text"
		id="profileName"
		placeholder="Roof Estimation"
	>

    <h2>Patent Highlighter</h2>
    <div class="toggle-row">
	
		<input
			type="checkbox"
			id="wholeWordOnly"
		>
	
		<label for="wholeWordOnly">
			Match whole word only
		</label>
	
	</div>
	
	<div class="toggle-row">
	
		<input
			type="checkbox"
			id="enableAllGroups"
		>
	
		<label for="enableAllGroups">
			Enable all groups
		</label>
	
	</div>
	
	<div class="keyword-mode-tabs">
	
		<button
			id="singleModeBtn"
			class="mode-active"
		>
			Single Words
		</button>
	
		<button
			id="phraseModeBtn"
		>
			Phrases
		</button>
	
	</div>

    <div id="groupsContainer"></div>

    <button id="addGroupBtn">
        + Add Group
    </button>
    <button id="saveBtn">
		Save
	</button>
	
    <button id="exportBtn">
		Export Profile
	</button>
	
	<button id="importBtn">
		Import Profile
	</button>
	
	<input
		type="file"
		id="importFile"
		accept=".json"
		style="display:none;"
	>
	
	<script type="module" src="popup.js"></script>
</body>

</html>
